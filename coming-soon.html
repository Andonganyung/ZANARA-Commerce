<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | ZANARA Commerce</title>
    <meta name="description" content="This page is coming soon. Stay tuned for updates from ZANARA Commerce.">
    <meta name="theme-color" content="#1a2744">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .coming-soon-page { min-height: 100vh; display: flex; flex-direction: column; }
        .coming-soon-section { flex: 1; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); padding: 60px 20px; }
        .coming-soon-content { text-align: center; color: white; max-width: 600px; }
        .coming-soon-icon { font-size: 80px; margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .coming-soon-content h1 { font-size: 48px; margin-bottom: 20px; }
        .coming-soon-content p { font-size: 18px; opacity: 0.9; margin-bottom: 40px; line-height: 1.8; }
        .coming-soon-form { display: flex; gap: 10px; max-width: 450px; margin: 0 auto 30px; }
        .coming-soon-form input { flex: 1; padding: 15px 20px; border: none; border-radius: var(--radius-sm); font-size: 15px; }
        .coming-soon-form button { padding: 15px 30px; background: white; color: var(--primary); border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: var(--transition); }
        .coming-soon-form button:hover { background: var(--cream); }
        .back-link { color: white; text-decoration: underline; font-size: 16px; }
        .back-link:hover { opacity: 0.8; }
        @media (max-width: 576px) { .coming-soon-content h1 { font-size: 32px; } .coming-soon-form { flex-direction: column; } }
    </style>
    <script>
        if (sessionStorage.getItem('zanaraAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="coming-soon-page">
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-text">ZANARA</span>
                <span class="logo-sub">COMMERCE</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="nav-icon cart-icon"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
            </div>
            <button class="mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- Coming Soon Section -->
    <section class="coming-soon-section">
        <div class="coming-soon-content">
            <div class="coming-soon-icon">
                <i class="fas fa-tools"></i>
            </div>
            <h1>Coming Soon</h1>
            <p>We're working hard to bring you something amazing! This page is currently under construction. Subscribe to be notified when we launch.</p>
            <form class="coming-soon-form">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">Notify Me</button>
            </form>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
