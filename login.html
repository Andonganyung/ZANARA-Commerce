<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal | ZANARA Commerce</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2744 0%, #0d1117 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 480px;
            padding: 60px 50px;
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }
        
        .logo {
            margin-bottom: 40px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #1a2744 0%, #2d3f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            display: block;
        }
        
        .logo-sub {
            font-size: 11px;
            letter-spacing: 10px;
            color: #d4a574;
            margin-top: 8px;
            font-weight: 600;
            display: block;
        }
        
        .login-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px;
            box-shadow: 0 10px 40px rgba(212, 165, 116, 0.4);
        }
        
        .login-icon i {
            font-size: 40px;
            color: #1a2744;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a2744;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #6c6c8a;
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 25px;
        }
        
        .form-group i {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4a574;
            font-size: 20px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 20px 25px 20px 60px;
            font-size: 16px;
            border: 2px solid #e8eaed;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
        }
        
        input[type="password"]:focus {
            border-color: #d4a574;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(212, 165, 116, 0.15);
        }
        
        input[type="password"]::placeholder {
            color: #9aa0a6;
        }
        
        .login-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 50%, #d4a574 100%);
            color: #1a2744;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 30px rgba(212, 165, 116, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        
        .login-btn:hover::before {
            left: 100%;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(212, 165, 116, 0.5);
        }
        
        .login-btn:active {
            transform: translateY(-1px);
        }
        
        .error-message {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 16px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .footer-text {
            margin-top: 40px;
            color: #9aa0a6;
            font-size: 13px;
        }
        
        .footer-text i {
            color: #d4a574;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 50px 30px;
                border-radius: 20px;
            }
            
            .logo-text {
                font-size: 32px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .login-icon {
                width: 80px;
                height: 80px;
            }
            
            .login-icon i {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="logo-text">ZANARA</span>
            <span class="logo-sub">COMMERCE</span>
        </div>
        
        <div class="login-icon">
            <i class="fas fa-lock"></i>
        </div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your access code to explore our exclusive collection</p>
        
        <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i> Incorrect password. Please try again.
        </div>
        
        <form id="loginForm" onsubmit="return checkPassword(event)">
            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Enter Access Code" autocomplete="off" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>&nbsp;&nbsp;Access Store
            </button>
        </form>
        
        <p class="footer-text">
            <i class="fas fa-shield-alt"></i>&nbsp;&nbsp;Protected Content - Authorized Access Only
        </p>
    </div>
    
    <script>
        function checkPassword(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (password === 'Admin@123') {
                sessionStorage.setItem('zanaraAuth', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 4000);
            }
            return false;
        }
        
        // Auto-focus password field
        document.getElementById('password').focus();
    </script>
</body>
</html>
